<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="sidebar">
    <h2>StudySync</h2>
    <a href="#">Dashboard</a>
    <a href="#">Timetable</a>
    <a href="#">Goals</a>
    <a href="#">Notes</a>
    <a href="#">Profile</a>
</div>

<div class="main">
    <h1>Welcome Back!</h1>

    <div class="cards">
        <div class="card">
            <h2>Study Hours</h2>
            <p>6 Hours</p>
        </div>

        <div class="card">
            <h2>Goals Completed</h2>
            <p>8/10</p>
        </div>

        <div class="card">
            <h2>Study Streak</h2>
            <p>12 Days 🔥</p>
        </div>
    </div>

    <div class="subjects">
        <h2>Subjects</h2>

        <div class="subject">
            <h3>DSA</h3>
            <div class="progress">
                <div class="fill" style="width:70%"></div>
            </div>
        </div>

        <div class="subject">
            <h3>DBMS</h3>
            <div class="progress">
                <div class="fill" style="width:50%"></div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
